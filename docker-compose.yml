services:
  postgres:
    image: postgres:16-alpine
    container_name: text-voice-ai-platform-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-text-voice-ai-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-text-voice-ai-platform_dev}
      POSTGRES_DB: ${POSTGRES_DB:-text-voice-ai-platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-text-voice-ai-platform}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - text-voice-ai-platform-network

  redis:
    image: redis:7-alpine
    container_name: text-voice-ai-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - text-voice-ai-platform-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: text-voice-ai-platform-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-text-voice-ai-platform}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-text-voice-ai-platform_dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - text-voice-ai-platform-network

  minio:
    image: minio/minio:latest
    container_name: text-voice-ai-platform-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-text-voice-ai-platform}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-text-voice-ai-platform_dev_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - text-voice-ai-platform-network

  minio-setup:
    image: minio/mc:latest
    container_name: text-voice-ai-platform-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb myminio/$${MINIO_BUCKET} --ignore-existing;
      mc anonymous set download myminio/$${MINIO_BUCKET}/public;
      echo 'MinIO bucket ready.';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-text-voice-ai-platform}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-text-voice-ai-platform_dev_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-text-voice-ai-platform-audio}
    networks:
      - text-voice-ai-platform-network

  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: text-voice-ai-platform-tts
    ports:
      - "8000:8000"
    volumes:
      - tts-models:/app/models
    environment:
      TTS_LOG_LEVEL: info
      TTS_DEFAULT_VOICE: af_heart
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - text-voice-ai-platform-network

  traefik:
    image: traefik:v3.2
    container_name: text-voice-ai-platform-traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./services/gateway/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - text-voice-ai-platform-network

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  tts-models:

networks:
  text-voice-ai-platform-network:
    driver: bridge
